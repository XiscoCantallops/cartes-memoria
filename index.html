<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartes de Memòria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .rotate-y-180 { transform: rotateY(180deg); }

    .flashcard {
      padding: 1rem 1rem 3.8rem 1rem;
    }

    .action-icon {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(51, 65, 85, 0.9);
      color: white;
      font-size: 1.25rem;
      font-weight: 700;
      user-select: none;
      cursor: pointer;
      transition: color 160ms ease, transform 160ms ease, background 160ms ease;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .action-icon:active { transform: scale(0.96); }
    .action-icon.active { color: #facc15; }

    .feedback-slot {
      min-height: 1.35rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 .5rem;
      line-height: 1.1;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      margin-top: 1.8rem;
      padding: 0 .25rem;
      color: #475569;
    }
    .hint-row .hint-center {
      font-size: 0.72rem;
      opacity: .8;
      text-align: center;
      white-space: nowrap;
    }
    .hint-row .hint-edge {
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .example-box {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 0.9rem;
      padding: 0.85rem 0.95rem;
    }

    .dataset-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #475569 50%), linear-gradient(135deg, #475569 50%, transparent 50%);
      background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .flashcard-surface {
      background: linear-gradient(135deg, rgb(214 211 209), rgb(231 229 228), rgb(226 232 240));
    }

    .term-front {
      font-weight: 800;
      color: rgb(30 41 59);
      text-wrap: balance;
      word-break: break-word;
    }

    .back-main-standard,
    .back-main-abbr {
      color: rgb(15 23 42);
      font-weight: 700;
      line-height: 1.15;
      text-wrap: balance;
      word-break: break-word;
    }

    .back-main-abbr {
      text-align: center;
    }

    .card-shell {
      touch-action: pan-y;
    }

    .card-fade-enter {
      animation: cardFade .22s ease;
    }

    @keyframes cardFade {
      from { opacity: .72; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-stone-200 p-3 text-slate-800">
  <div class="max-w-xl mx-auto h-[100dvh] flex flex-col gap-3">
    <header class="bg-white rounded-xl shadow p-3 text-center">
      <h1 class="text-2xl font-bold">Cartes de Memòria</h1>
    </header>

    <section class="bg-white rounded-xl shadow p-3">
      <p class="text-xs uppercase tracking-[0.25em] text-slate-500 mb-2">Conjunt de dades</p>
      <select id="datasetSelect" class="dataset-select w-full rounded-lg border border-slate-300 bg-slate-50 px-3 py-2 pr-8 text-slate-800 font-medium outline-none focus:ring-2 focus:ring-slate-400">
        <option>Carregant...</option>
      </select>
      <p id="datasetError" class="hidden text-xs text-rose-600 mt-2"></p>
    </section>

    <section class="bg-white rounded-xl shadow p-3">
      <div class="flex justify-between items-end gap-3 mb-2">
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-slate-500">Progrés</p>
          <p id="progressText" class="font-bold text-slate-800">0 apreses de 0</p>
        </div>
        <div class="text-right">
          <p class="text-xs uppercase tracking-[0.25em] text-slate-500">Pendents</p>
          <p id="remainingInfo" class="font-bold text-slate-800">0</p>
        </div>
      </div>
      <div class="h-2 bg-stone-200 rounded-full overflow-hidden mb-3">
        <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-300" style="width:0%"></div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button id="shuffleBtn" class="bg-amber-500 text-white py-2 rounded-lg font-semibold">Barrejar</button>
        <button id="resetBtn" class="bg-rose-500 text-white py-2 rounded-lg font-semibold">Reiniciar</button>
      </div>
    </section>

    <main class="flex-1 min-h-0">
      <div class="card-shell h-full bg-white rounded-xl shadow p-3 overflow-hidden">
        <div class="h-full perspective-[1200px]">
          <div id="card" class="relative w-full h-full preserve-3d transition-transform duration-500 ease-out card-fade-enter">

            <section class="absolute inset-0 backface-hidden flashcard-surface rounded-[1.25rem] flashcard flex flex-col">
              <div class="grid grid-cols-[2.6rem_1fr_2.6rem] items-center gap-2">
                <button id="favoriteFront" class="action-icon" aria-label="Afegir a favorits">★</button>
                <div id="feedbackFront" class="feedback-slot"></div>
                <button id="learnFront" class="action-icon" aria-label="Marcar com a apresa">✓</button>
              </div>

              <div class="flex-1 flex flex-col justify-center items-center text-center px-2">
                <p class="uppercase text-sm tracking-[0.25em] text-slate-600 mb-3">Terme</p>
                <h2 id="frontTerm" class="term-front">—</h2>
              </div>

              <div class="hint-row">
                <span class="hint-edge">← llisca</span>
                <span class="hint-center">toca per girar</span>
                <span class="hint-edge">llisca →</span>
              </div>
            </section>

            <section class="absolute inset-0 backface-hidden rotate-y-180 flashcard-surface rounded-[1.25rem] flashcard flex flex-col">
              <div class="grid grid-cols-[2.6rem_1fr_2.6rem] items-center gap-2">
                <button id="favoriteBack" class="action-icon" aria-label="Afegir a favorits">★</button>
                <div id="feedbackBack" class="feedback-slot"></div>
                <button id="learnBack" class="action-icon" aria-label="Marcar com a apresa">✓</button>
              </div>

              <div class="flex-1 flex flex-col justify-center min-h-0">
                <div class="mb-4 text-center">
                  <p class="uppercase text-xs tracking-[0.25em] text-slate-600 mb-2">Terme</p>
                  <h3 id="backTerm" class="font-bold text-slate-700"></h3>
                </div>

                <div class="mb-4 text-center">
                  <p id="backMainLabel" class="uppercase text-xs tracking-[0.25em] text-slate-600 mb-2">Definició</p>
                  <div id="backMainValue" class="back-main-standard"></div>
                </div>

                <div>
                  <p class="uppercase text-xs tracking-[0.25em] text-slate-600 mb-2">Exemple</p>
                  <div class="example-box">
                    <p id="exampleText" class="italic text-slate-900 font-medium"></p>
                  </div>
                </div>
              </div>

              <div class="hint-row">
                <span class="hint-edge">← llisca</span>
                <span class="hint-center">toca per girar</span>
                <span class="hint-edge">llisca →</span>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const DATASET_INDEX = "datasets.json";
    const STORAGE_KEY = "flashcards-app-state-v1";

    const state = {
      datasets: [],
      datasetFile: "",
      data: [],
      deck: [],
      index: 0,
      flipped: false,
      notification: "",
      activeAction: "",
      dragStartX: null,
      dragCurrentX: null
    };

    const datasetSelect = document.getElementById("datasetSelect");
    const datasetError = document.getElementById("datasetError");
    const progressText = document.getElementById("progressText");
    const remainingInfo = document.getElementById("remainingInfo");
    const progressBar = document.getElementById("progressBar");
    const card = document.getElementById("card");
    const frontTerm = document.getElementById("frontTerm");
    const backTerm = document.getElementById("backTerm");
    const backMainLabel = document.getElementById("backMainLabel");
    const backMainValue = document.getElementById("backMainValue");
    const exampleText = document.getElementById("exampleText");
    const feedbackFront = document.getElementById("feedbackFront");
    const feedbackBack = document.getElementById("feedbackBack");

    function loadSavedState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveState() {
      const saved = loadSavedState();
      saved.lastDataset = state.datasetFile;
      if (state.datasetFile) {
        saved[state.datasetFile] = {
          deck: state.deck,
          index: state.index,
          flipped: state.flipped
        };
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function autoFont(el, maxPx, minPx) {
      const len = (el.textContent || "").trim().length || 1;
      const size = Math.max(minPx, maxPx - len * 0.28);
      el.style.fontSize = size + "px";
    }

    function currentCard() {
      if (!state.deck.length) return null;
      if (state.index < 0) state.index = 0;
      if (state.index >= state.deck.length) state.index = state.deck.length - 1;
      return state.deck[state.index] || null;
    }

    function isAbbreviationDataset(cardData) {
      return !!(cardData && (cardData.abreviatura ?? cardData.abreviacio ?? cardData.abrev));
    }

    function getBackMain(cardData) {
      if (!cardData) return { label: "Definició", value: "" };
      if (cardData.abreviatura != null) return { label: "Abreviatura", value: cardData.abreviatura };
      if (cardData.abreviacio != null) return { label: "Abreviatura", value: cardData.abreviacio };
      if (cardData.abrev != null) return { label: "Abreviatura", value: cardData.abrev };
      return { label: "Definició", value: cardData.definicio || cardData.definicio || cardData.resposta || "" };
    }

    function setFeedback(message) {
      feedbackFront.textContent = message || "";
      feedbackBack.textContent = message || "";
    }

    let feedbackTimeout = null;
    function flashFeedback(message, action) {
      state.notification = message;
      state.activeAction = action;
      setFeedback(message);
      syncActionIcons();
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        state.notification = "";
        state.activeAction = "";
        setFeedback("");
        syncActionIcons();
      }, 900);
    }

    function syncActionIcons() {
      const favButtons = [document.getElementById("favoriteFront"), document.getElementById("favoriteBack")];
      const learnButtons = [document.getElementById("learnFront"), document.getElementById("learnBack")];
      favButtons.forEach(btn => btn.classList.toggle("active", state.activeAction === "favorite"));
      learnButtons.forEach(btn => btn.classList.toggle("active", state.activeAction === "learn"));
    }

    function triggerCardRefreshAnimation() {
      card.classList.remove("card-fade-enter");
      void card.offsetWidth;
      card.classList.add("card-fade-enter");
    }

    function render() {
      const total = state.data.length;
      const remaining = state.deck.length;
      const learned = Math.max(0, total - remaining);

      progressText.textContent = `${learned} apreses de ${total}`;
      remainingInfo.textContent = remaining;
      progressBar.style.width = total ? `${(learned / total) * 100}%` : "0%";

      const cardData = currentCard();
      card.classList.toggle("rotate-y-180", state.flipped);
      setFeedback(state.notification);
      syncActionIcons();

      if (!cardData) {
        frontTerm.textContent = "Enhorabona";
        backTerm.textContent = "Enhorabona";
        backMainLabel.textContent = "Estat";
        backMainValue.textContent = "Ja has acabat";
        backMainValue.className = "back-main-standard text-center";
        exampleText.textContent = "Prem Reiniciar";
        autoFont(frontTerm, 42, 28);
        autoFont(backTerm, 28, 20);
        autoFont(backMainValue, 30, 22);
        autoFont(exampleText, 20, 16);
        saveState();
        return;
      }

      const backMain = getBackMain(cardData);
      const abbreviationMode = isAbbreviationDataset(cardData);
      frontTerm.textContent = cardData.terme || cardData.pregunta || "—";
      backTerm.textContent = cardData.terme || cardData.pregunta || "—";
      backMainLabel.textContent = backMain.label;
      backMainValue.textContent = backMain.value || "—";
      exampleText.textContent = cardData.exemple || cardData.exemple_frase || cardData.frase_exemple || "—";
      backMainValue.className = abbreviationMode ? "back-main-abbr" : "back-main-standard";

      autoFont(frontTerm, 42, 26);
      autoFont(backTerm, 28, 18);
      if (abbreviationMode) {
        const termSize = Math.max(22, 28 - ((backTerm.textContent || "").length * 0.22));
        backTerm.style.fontSize = termSize + "px";
        backMainValue.style.fontSize = (termSize + 2) + "px";
      } else {
        autoFont(backMainValue, 30, 18);
      }
      autoFont(exampleText, 18, 14);
      saveState();
    }

    function flipCard() {
      if (!state.deck.length) return;
      state.flipped = !state.flipped;
      render();
    }

    function nextCard() {
      if (!state.deck.length) return;
      state.index = (state.index + 1) % state.deck.length;
      state.flipped = false;
      state.notification = "";
      state.activeAction = "";
      triggerCardRefreshAnimation();
      render();
    }

    function prevCard() {
      if (!state.deck.length) return;
      state.index = (state.index - 1 + state.deck.length) % state.deck.length;
      state.flipped = false;
      state.notification = "";
      state.activeAction = "";
      triggerCardRefreshAnimation();
      render();
    }

    function favoriteCard() {
      if (!state.deck.length) return;
      const [cardData] = state.deck.splice(state.index, 1);
      state.deck.push(cardData);
      if (state.index >= state.deck.length) state.index = 0;
      state.flipped = false;
      flashFeedback("Afegida a favorits", "favorite");
      triggerCardRefreshAnimation();
      render();
    }

    function learnCard() {
      if (!state.deck.length) return;
      state.deck.splice(state.index, 1);
      if (state.index >= state.deck.length) state.index = Math.max(0, state.deck.length - 1);
      state.flipped = false;
      flashFeedback("Carta apresa", "learn");
      triggerCardRefreshAnimation();
      render();
    }

    function shuffleDeck() {
      for (let i = state.deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.deck[i], state.deck[j]] = [state.deck[j], state.deck[i]];
      }
      state.index = 0;
      state.flipped = false;
      state.notification = "";
      state.activeAction = "";
      triggerCardRefreshAnimation();
      render();
    }

    function resetDeck() {
      state.deck = state.data.map(item => ({ ...item }));
      state.index = 0;
      state.flipped = false;
      state.notification = "";
      state.activeAction = "";
      triggerCardRefreshAnimation();
      render();
    }

    async function loadDatasets() {
      datasetError.classList.add("hidden");
      try {
        const res = await fetch(DATASET_INDEX, { cache: "no-store" });
        if (!res.ok) throw new Error("No s'ha pogut carregar datasets.json");
        const datasets = await res.json();
        state.datasets = Array.isArray(datasets) ? datasets : [];
      } catch (err) {
        state.datasets = [{ name: "Glosari", file: "glosari.json" }];
        datasetError.textContent = "No s'ha pogut llegir datasets.json. S'usa glosari.json com a alternativa.";
        datasetError.classList.remove("hidden");
      }

      state.datasets.sort((a, b) => (a.name || "").localeCompare(b.name || "", "ca"));
      datasetSelect.innerHTML = "";
      state.datasets.forEach(ds => {
        const opt = document.createElement("option");
        opt.value = ds.file;
        opt.textContent = ds.name;
        datasetSelect.appendChild(opt);
      });

      const saved = loadSavedState();
      const preferred = saved.lastDataset && state.datasets.some(ds => ds.file === saved.lastDataset)
        ? saved.lastDataset
        : (state.datasets[0]?.file || "");

      datasetSelect.value = preferred;
      if (preferred) await loadDataset(preferred);
    }

    async function loadDataset(file) {
      state.datasetFile = file;
      datasetError.classList.add("hidden");
      try {
        const res = await fetch(file, { cache: "no-store" });
        if (!res.ok) throw new Error(`No s'ha pogut carregar ${file}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("El JSON no té format de llista");
        state.data = data.map(item => ({ ...item }));
        const saved = loadSavedState()[file];
        if (saved && Array.isArray(saved.deck) && saved.deck.length <= state.data.length) {
          state.deck = saved.deck.map(item => ({ ...item }));
          state.index = Math.min(saved.index || 0, Math.max(0, state.deck.length - 1));
          state.flipped = !!saved.flipped;
        } else {
          state.deck = state.data.map(item => ({ ...item }));
          state.index = 0;
          state.flipped = false;
        }
        state.notification = "";
        state.activeAction = "";
        triggerCardRefreshAnimation();
        render();
      } catch (err) {
        state.data = [];
        state.deck = [];
        state.index = 0;
        state.flipped = false;
        datasetError.textContent = `${err.message}. Revisa que el fitxer existeixi i sigui a la mateixa carpeta.`;
        datasetError.classList.remove("hidden");
        render();
      }
    }

    function getClientX(evt) {
      if (evt.touches && evt.touches[0]) return evt.touches[0].clientX;
      if (evt.changedTouches && evt.changedTouches[0]) return evt.changedTouches[0].clientX;
      return evt.clientX;
    }

    function onPointerStart(evt) {
      state.dragStartX = getClientX(evt);
      state.dragCurrentX = state.dragStartX;
    }

    function onPointerMove(evt) {
      if (state.dragStartX == null) return;
      state.dragCurrentX = getClientX(evt);
    }

    function onPointerEnd(evt) {
      if (state.dragStartX == null) return;
      const endX = getClientX(evt);
      const deltaX = endX - state.dragStartX;
      state.dragStartX = null;
      state.dragCurrentX = null;
      if (Math.abs(deltaX) < 60) return;
      if (deltaX < 0) nextCard();
      else prevCard();
    }

    card.addEventListener("click", (evt) => {
      if (evt.target.closest("button")) return;
      flipCard();
    });

    ["favoriteFront", "favoriteBack"].forEach(id => {
      document.getElementById(id).addEventListener("click", (evt) => {
        evt.stopPropagation();
        favoriteCard();
      });
    });

    ["learnFront", "learnBack"].forEach(id => {
      document.getElementById(id).addEventListener("click", (evt) => {
        evt.stopPropagation();
        learnCard();
      });
    });

    document.getElementById("shuffleBtn").addEventListener("click", shuffleDeck);
    document.getElementById("resetBtn").addEventListener("click", resetDeck);

    datasetSelect.addEventListener("change", (evt) => {
      loadDataset(evt.target.value);
    });

    const pointerTarget = document.querySelector(".card-shell");
    pointerTarget.addEventListener("touchstart", onPointerStart, { passive: true });
    pointerTarget.addEventListener("touchmove", onPointerMove, { passive: true });
    pointerTarget.addEventListener("touchend", onPointerEnd, { passive: true });
    pointerTarget.addEventListener("mousedown", onPointerStart);
    pointerTarget.addEventListener("mousemove", onPointerMove);
    pointerTarget.addEventListener("mouseup", onPointerEnd);
    pointerTarget.addEventListener("mouseleave", onPointerEnd);

    document.addEventListener("keydown", (evt) => {
      if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
      if (evt.key === "ArrowRight") { evt.preventDefault(); nextCard(); }
      else if (evt.key === "ArrowLeft") { evt.preventDefault(); prevCard(); }
      else if (evt.key === " " || evt.code === "Space") { evt.preventDefault(); flipCard(); }
      else if (evt.key.toLowerCase() === "f") { evt.preventDefault(); favoriteCard(); }
      else if (evt.key.toLowerCase() === "a") { evt.preventDefault(); learnCard(); }
    });

    loadDatasets();
  </script>
</body>
</html>
