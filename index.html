<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cartes de Memòria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #e7e5e4;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      overflow: hidden;
    }

    .perspective { perspective: 1400px; }
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 1rem;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .card-flip { transform: rotateY(180deg); }

    .card-animated {
      transition: transform 0.55s cubic-bezier(.22,1,.36,1), opacity 0.25s ease;
      will-change: transform;
    }

    .card-enter { animation: cardEnter 0.28s ease; }

    @keyframes cardEnter {
      from { opacity: 0.65; transform: scale(0.985); }
      to { opacity: 1; transform: scale(1); }
    }

    .glass {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
    }

    .shadow-soft {
      box-shadow:
        0 10px 25px rgba(15, 23, 42, 0.08),
        0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .btn-press {
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .btn-press:active { transform: scale(0.98); }

    .term-text {
      line-height: 1.05;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body class="text-slate-800">
  <div class="max-w-xl mx-auto h-[100dvh] p-3 sm:p-4 flex flex-col gap-3">

    <header class="glass shadow-soft rounded-2xl p-4">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h1 id="appTitle" class="text-2xl sm:text-3xl font-extrabold tracking-tight break-words">
            Cartes de Memòria
          </h1>
          <p id="datasetName" class="text-sm text-slate-600 mt-1 break-all">
            glosari.json
          </p>
        </div>
        <div class="text-3xl shrink-0" aria-hidden="true">📚</div>
      </div>

      <div class="mt-4">
        <label for="datasetSelect" class="block text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-2">
          Conjunt de cartes
        </label>

        <select id="datasetSelect"
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-3 text-slate-800 font-semibold">
          <option value="glosari.json">Glossari</option>
          <option value="abreviatures.json">Abreviatures</option>
        </select>
      </div>
    </header>

    <section class="glass shadow-soft rounded-2xl p-4">
      <div class="grid grid-cols-2 gap-4 items-start">
        <div>
          <p class="text-[11px] uppercase tracking-[0.22em] text-slate-500">Progrés</p>
          <p id="progressText" class="text-lg font-bold">0 apreses de 0</p>
        </div>
        <div class="text-right">
          <p class="text-[11px] uppercase tracking-[0.22em] text-slate-500">Pendents</p>
          <p id="remainingText" class="text-lg font-bold">0</p>
        </div>
      </div>

      <div class="mt-3 h-3 bg-stone-200 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full rounded-full bg-emerald-500 transition-all duration-500 ease-out" style="width:0%"></div>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button id="studyModeBtn" class="btn-press px-3 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold">
          Mode estudi: pendents
        </button>

        <button id="shuffleBtn" class="btn-press px-3 py-2 rounded-xl bg-amber-500 text-white text-sm font-semibold">
          Barrejar
        </button>

        <button id="resetProgressBtn" class="btn-press px-3 py-2 rounded-xl bg-rose-500 text-white text-sm font-semibold">
          Reiniciar progrés
        </button>

        <button id="resetOrderBtn" class="btn-press px-3 py-2 rounded-xl bg-slate-200 text-slate-800 text-sm font-semibold">
          Ordre original
        </button>
      </div>
    </section>

    <main class="flex-1 min-h-0">
      <div class="h-full perspective">
        <div id="card" class="relative h-full w-full preserve-3d card-animated card-enter cursor-pointer select-none">

          <section class="card-face backface-hidden glass shadow-soft p-4 sm:p-5 flex flex-col">
            <div class="flex items-center justify-between gap-3">
              <span id="frontLabel" class="text-[11px] uppercase tracking-[0.25em] text-slate-500">Camp 1</span>
              <div class="flex items-center gap-2">
                <button id="speakFrontBtn"
                  class="btn-press w-11 h-11 rounded-full bg-slate-700 text-white flex items-center justify-center text-lg"
                  title="Escoltar" aria-label="Escoltar">🔊</button>

                <button id="learnFrontBtn"
                  class="btn-press w-11 h-11 rounded-full bg-emerald-600 text-white flex items-center justify-center text-lg"
                  title="Marcar com apresa" aria-label="Marcar com apresa">✅</button>
              </div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center text-center py-4">
              <p id="frontIndex" class="text-sm font-semibold text-slate-500 mb-4">Carta 0 de 0</p>
              <h2 id="frontTerm" class="term-text font-extrabold text-slate-800 text-4xl sm:text-5xl">Carregant...</h2>
              <p class="mt-6 text-sm text-slate-500">Toca la carta per veure el revers</p>
            </div>
          </section>

          <section class="card-face backface-hidden glass shadow-soft p-4 sm:p-5 flex flex-col card-flip">
            <div class="flex items-center justify-between gap-3">
              <span id="backSectionTitle" class="text-[11px] uppercase tracking-[0.25em] text-slate-500">Camp 2</span>
              <div class="flex items-center gap-2">
                <button id="speakBackBtn"
                  class="btn-press w-11 h-11 rounded-full bg-slate-700 text-white flex items-center justify-center text-lg"
                  title="Escoltar" aria-label="Escoltar">🔊</button>

                <button id="learnBackBtn"
                  class="btn-press w-11 h-11 rounded-full bg-emerald-600 text-white flex items-center justify-center text-lg"
                  title="Marcar com apresa" aria-label="Marcar com apresa">✅</button>
              </div>
            </div>

            <div class="mt-4 mb-3">
              <p id="backTermLabel" class="text-[11px] uppercase tracking-[0.25em] text-slate-500">Camp 1</p>
              <h3 id="backTerm" class="text-xl sm:text-2xl font-bold text-slate-800 mt-1">—</h3>
            </div>

            <div class="mb-4">
              <p id="backValueLabel" class="text-[11px] uppercase tracking-[0.25em] text-slate-500">Camp 2</p>
              <p id="definitionText" class="text-base sm:text-lg font-medium text-slate-800 mt-1 leading-relaxed">—</p>
            </div>

            <div class="mt-auto">
              <p id="exampleLabel" class="text-[11px] uppercase tracking-[0.25em] text-slate-500">Camp 3</p>
              <div class="mt-1 rounded-2xl border border-white/60 bg-white/50 p-3">
                <p id="exampleText" class="italic text-slate-900 font-medium leading-relaxed">—</p>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="glass shadow-soft rounded-2xl p-3">
      <div class="grid grid-cols-3 gap-2">
        <button id="prevBtn" class="btn-press py-3 rounded-xl bg-sky-500 text-white font-semibold">← Anterior</button>
        <button id="flipBtn" class="btn-press py-3 rounded-xl bg-slate-700 text-white font-semibold">Girar</button>
        <button id="nextBtn" class="btn-press py-3 rounded-xl bg-sky-700 text-white font-semibold">Següent →</button>
      </div>
    </footer>
  </div>

  <script>
    const DATASETS = {
      "glosari.json": "Glossari",
      "abreviatures.json": "Abreviatures"
    };

    const APP_PREFIX = "flashcards-dataset-v4";

    const card = document.getElementById("card");
    const frontTerm = document.getElementById("frontTerm");
    const backTerm = document.getElementById("backTerm");
    const definitionText = document.getElementById("definitionText");
    const exampleText = document.getElementById("exampleText");
    const progressText = document.getElementById("progressText");
    const remainingText = document.getElementById("remainingText");
    const progressBar = document.getElementById("progressBar");
    const frontIndex = document.getElementById("frontIndex");
    const studyModeBtn = document.getElementById("studyModeBtn");
    const appTitle = document.getElementById("appTitle");
    const datasetName = document.getElementById("datasetName");
    const datasetSelect = document.getElementById("datasetSelect");

    let rawData = [];
    let data = [];

    let state = {
      currentIndex: 0,
      flipped: false,
      learnedIds: [],
      studyMode: "pending"
    };

    let datasetMeta = {
      fileName: "glosari.json",
      sourceId: "url:glosari.json",
      title: "Cartes de Memòria Glossari",
      frontKey: "terme",
      backKey: "definicio",
      extraKey: "exemple"
    };

    function prettifyLabel(text) {
      return String(text || "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function getDatasetDisplayName(fileName) {
      return DATASETS[fileName] || prettifyLabel(fileName.replace(".json", ""));
    }

    function setTitleFromDataset(fileName) {
      const niceName = getDatasetDisplayName(fileName);
      const title = `Cartes de Memòria ${niceName}`;
      datasetMeta.title = title;
      datasetMeta.fileName = fileName;
      datasetMeta.sourceId = `url:${fileName}`;
      document.title = title;
      appTitle.textContent = title;
      datasetName.textContent = fileName;
    }

    function getObjectArray(json) {
      if (Array.isArray(json)) return json;

      if (json && typeof json === "object") {
        for (const key of Object.keys(json)) {
          if (Array.isArray(json[key])) return json[key];
        }
      }

      return null;
    }

    function inferKeys(array) {
      const firstValid = array.find(item => item && typeof item === "object" && !Array.isArray(item));
      if (!firstValid) return null;

      const keys = Object.keys(firstValid).filter(k => k !== "id");
      if (keys.length < 2) return null;

      return {
        frontKey: keys[0],
        backKey: keys[1],
        extraKey: keys[2] || ""
      };
    }

    function normalizeEntry(item, index) {
      const idValue = item.id ?? item.ID ?? item.Id ?? index + 1;

      return {
        id: String(idValue),
        front: String(item[datasetMeta.frontKey] ?? "").trim(),
        back: String(item[datasetMeta.backKey] ?? "").trim(),
        extra: datasetMeta.extraKey ? String(item[datasetMeta.extraKey] ?? "").trim() : ""
      };
    }

    function getStorageKey() {
      return `${APP_PREFIX}:${datasetMeta.sourceId}:progress`;
    }

    function getOrderStorageKey() {
      return `${APP_PREFIX}:${datasetMeta.sourceId}:order`;
    }

    function saveProgress() {
      localStorage.setItem(getStorageKey(), JSON.stringify({
        learnedIds: state.learnedIds,
        studyMode: state.studyMode
      }));
    }

    function loadSavedState() {
      try {
        const raw = localStorage.getItem(getStorageKey());
        if (!raw) {
          state.learnedIds = [];
          state.studyMode = "pending";
          return;
        }

        const parsed = JSON.parse(raw);
        state.learnedIds = Array.isArray(parsed.learnedIds) ? parsed.learnedIds : [];
        state.studyMode = parsed.studyMode === "all" ? "all" : "pending";
      } catch {
        state.learnedIds = [];
        state.studyMode = "pending";
      }
    }

    function saveOrder() {
      const ids = data.map(item => item.id);
      localStorage.setItem(getOrderStorageKey(), JSON.stringify(ids));
    }

    function restoreOrderIfAvailable() {
      try {
        const raw = localStorage.getItem(getOrderStorageKey());
        if (!raw) return;

        const savedIds = JSON.parse(raw);
        if (!Array.isArray(savedIds) || savedIds.length !== data.length) return;

        const map = new Map(data.map(item => [item.id, item]));
        const reordered = savedIds.map(id => map.get(id)).filter(Boolean);

        if (reordered.length === data.length) data = reordered;
      } catch {}
    }

    function updateLabels() {
      const frontLabel = prettifyLabel(datasetMeta.frontKey || "camp 1");
      const backLabel = prettifyLabel(datasetMeta.backKey || "camp 2");
      const extraLabel = prettifyLabel(datasetMeta.extraKey || "detall");

      document.getElementById("frontLabel").textContent = frontLabel;
      document.getElementById("backSectionTitle").textContent = backLabel;
      document.getElementById("backTermLabel").textContent = frontLabel;
      document.getElementById("backValueLabel").textContent = backLabel;
      document.getElementById("exampleLabel").textContent = extraLabel;
    }

    function getTotalCards() {
      return data.length;
    }

    function getActiveCards() {
      if (state.studyMode === "all") return data;
      return data.filter(item => !state.learnedIds.includes(item.id));
    }

    function clampIndex() {
      const active = getActiveCards();
      if (active.length === 0) {
        state.currentIndex = 0;
        return;
      }

      if (state.currentIndex >= active.length) state.currentIndex = active.length - 1;
      if (state.currentIndex < 0) state.currentIndex = 0;
    }

    function triggerCardEntryAnimation() {
      card.classList.remove("card-enter");
      void card.offsetWidth;
      card.classList.add("card-enter");
    }

    function updateStudyModeButton() {
      if (state.studyMode === "pending") {
        studyModeBtn.textContent = "Mode estudi: pendents";
        studyModeBtn.className = "btn-press px-3 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold";
      } else {
        studyModeBtn.textContent = "Mode estudi: tots";
        studyModeBtn.className = "btn-press px-3 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold";
      }
    }

    function updateProgressUI() {
      const total = getTotalCards();
      const learned = state.learnedIds.filter(id => data.some(item => item.id === id)).length;
      const pending = Math.max(total - learned, 0);
      const percent = total > 0 ? (learned / total) * 100 : 0;

      progressText.textContent = `${learned} apreses de ${total}`;
      remainingText.textContent = pending;
      progressBar.style.width = `${percent}%`;
    }

    function renderEmptyState(title, message) {
      frontIndex.textContent = "Carta 0 de 0";
      frontTerm.textContent = title;
      backTerm.textContent = title;
      definitionText.textContent = message;
      exampleText.textContent = datasetMeta.fileName || "";
      card.classList.toggle("card-flip", state.flipped);
      updateProgressUI();
      updateStudyModeButton();
      updateLabels();
    }

    function render() {
      updateProgressUI();
      updateStudyModeButton();
      updateLabels();

      if (!data.length) {
        renderEmptyState("Sense dades", "No hi ha cartes carregades.");
        return;
      }

      const active = getActiveCards();
      clampIndex();

      if (!active.length) {
        renderEmptyState("Enhorabona 🎉", "Ja has completat totes les cartes pendents.");
        return;
      }

      const current = active[state.currentIndex];
      const totalVisible = active.length;

      frontIndex.textContent = `Carta ${state.currentIndex + 1} de ${totalVisible}`;
      frontTerm.textContent = current.front || "Sense contingut";
      backTerm.textContent = current.front || "Sense contingut";
      definitionText.textContent = current.back || "Sense contingut";
      exampleText.textContent = current.extra || "Sense contingut";

      card.classList.toggle("card-flip", state.flipped);
    }

    function flipCard() {
      const active = getActiveCards();
      if (!active.length) return;
      state.flipped = !state.flipped;
      render();
    }

    function nextCard() {
      const active = getActiveCards();
      if (!active.length) return;
      state.currentIndex = (state.currentIndex + 1) % active.length;
      state.flipped = false;
      render();
      triggerCardEntryAnimation();
    }

    function prevCard() {
      const active = getActiveCards();
      if (!active.length) return;
      state.currentIndex = (state.currentIndex - 1 + active.length) % active.length;
      state.flipped = false;
      render();
      triggerCardEntryAnimation();
    }

    function markLearned() {
      const active = getActiveCards();
      if (!active.length) return;

      const current = active[state.currentIndex];
      if (!state.learnedIds.includes(current.id)) {
        state.learnedIds.push(current.id);
        saveProgress();
      }

      state.flipped = false;
      clampIndex();
      render();
      triggerCardEntryAnimation();
    }

    function resetProgress() {
      state.learnedIds = [];
      state.currentIndex = 0;
      state.flipped = false;
      saveProgress();
      render();
      triggerCardEntryAnimation();
    }

    function shuffleCards() {
      for (let i = data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [data[i], data[j]] = [data[j], data[i]];
      }
      state.currentIndex = 0;
      state.flipped = false;
      saveOrder();
      render();
      triggerCardEntryAnimation();
    }

    function restoreOriginalOrder() {
      data = [...rawData];
      state.currentIndex = 0;
      state.flipped = false;
      localStorage.removeItem(getOrderStorageKey());
      render();
      triggerCardEntryAnimation();
    }

    function toggleStudyMode() {
      state.studyMode = state.studyMode === "pending" ? "all" : "pending";
      state.currentIndex = 0;
      state.flipped = false;
      saveProgress();
      render();
      triggerCardEntryAnimation();
    }

    function speakCurrentFront() {
      const active = getActiveCards();
      if (!active.length) return;
      const current = active[state.currentIndex];

      if (!current?.front || !("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(current.front);
      utterance.lang = "ca-ES";
      utterance.rate = 0.95;
      window.speechSynthesis.speak(utterance);
    }

    async function loadDataset(fileName) {
      try {
        setTitleFromDataset(fileName);

        const response = await fetch(`./${fileName}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const json = await response.json();
        const array = getObjectArray(json);

        if (!array || !Array.isArray(array)) {
          throw new Error("El JSON no conté un array vàlid.");
        }

        const inferred = inferKeys(array);
        if (!inferred) {
          throw new Error("El JSON necessita almenys 2 camps útils per registre.");
        }

        datasetMeta.frontKey = inferred.frontKey;
        datasetMeta.backKey = inferred.backKey;
        datasetMeta.extraKey = inferred.extraKey;

        data = array.map(normalizeEntry).filter(item => item.front || item.back);
        rawData = [...data];

        loadSavedState();
        restoreOrderIfAvailable();

        state.learnedIds = state.learnedIds.filter(id => data.some(item => item.id === id));
        state.currentIndex = 0;
        state.flipped = false;

        render();
      } catch (error) {
        frontIndex.textContent = "Error";
        frontTerm.textContent = "No s'ha pogut carregar el JSON";
        backTerm.textContent = "Error";
        definitionText.textContent = error.message || String(error);
        exampleText.textContent = fileName;
        updateProgressUI();
        updateLabels();
      }
    }

    card.addEventListener("click", flipCard);

    document.getElementById("flipBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      flipCard();
    });

    document.getElementById("nextBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      nextCard();
    });

    document.getElementById("prevBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      prevCard();
    });

    document.getElementById("learnFrontBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      markLearned();
    });

    document.getElementById("learnBackBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      markLearned();
    });

    document.getElementById("resetProgressBtn").addEventListener("click", resetProgress);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleCards);
    document.getElementById("resetOrderBtn").addEventListener("click", restoreOriginalOrder);
    document.getElementById("studyModeBtn").addEventListener("click", toggleStudyMode);

    document.getElementById("speakFrontBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakCurrentFront();
    });

    document.getElementById("speakBackBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      speakCurrentFront();
    });

    datasetSelect.addEventListener("change", () => {
      loadDataset(datasetSelect.value);
    });

    let touchStartX = 0;
    let touchEndX = 0;

    card.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });

    card.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].clientX;
      const diff = touchEndX - touchStartX;

      if (Math.abs(diff) > 70) {
        if (diff < 0) nextCard();
        else prevCard();
      }
    }, { passive: true });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextCard();
      if (e.key === "ArrowLeft") prevCard();
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        flipCard();
      }
    });

    loadDataset(datasetSelect.value);
  </script>
</body>
</html>
